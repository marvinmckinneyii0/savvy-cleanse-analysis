# SavvyCortex pipeline configuration (Phase 2). Secrets live in .env, NOT here.

data_sources:
  - data/sales.csv            # file path(s) or directory(ies) the agents pull from

report_schedule:
  interval: weekly            # one of: daily | weekly | monthly
  # cron: "0 6 * * 1"         # OR a cron expression (mutually exclusive with interval)

metric_thresholds:            # per-metric fractional change; 0.15 == ±15%
  revenue: 0.15
  units_sold: 0.20

alert_recipients:
  - ops@example.com

output:
  format: docx                # docx | pdf
  output_dir: output/

# Story 3.4 — opt-in cleaning default + Tier-2 null-imputation policy.
# The WHOLE section is optional; omitting it means cleaning defaults OFF. This
# `enabled` is the config-file DEFAULT (one of three enablement surfaces, with
# run_full_pipeline(enable_cleaning=...) and CLI --clean/--no-clean); an
# explicit True/False at either of the other two always overrides it. With
# nothing set anywhere, cleaning is OFF (load-bearing, AC1). Interim home for
# this policy: it moves to project.cleaning_policy in Epic 4 (Story 4.1a).
# cleaning:
#   enabled: false            # config-file default — overridden by an explicit --clean/--no-clean
#   imputation:
#     defaults:               # optional: override the built-in per-type defaults
#       numeric: median       # built-in: median  (robust to SMB revenue/qty outliers)
#       categorical: mode     # built-in: mode
#       datetime: forward_fill # built-in: forward_fill
#     columns:                # optional: per-column overrides (highest precedence)
#       revenue: median
#       region: leave_as_is   # policy-layer skip; the primitive is never called
#     # method allowlist: mean | median | mode | forward_fill | leave_as_is
