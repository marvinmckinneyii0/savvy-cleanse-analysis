# SavvyCortex pipeline configuration (Phase 2 automation agents).
# Secrets (SMTP credentials, API keys) live in .env, NOT here — an `smtp:`
# section in this file is rejected at load time.
#
# Agents call PipelineConfig.load() at the start of each scheduled run, so
# edits to this file take effect on the next run without a restart.

# File path(s) or directory(ies) the agents pull data from.
data_sources:
  - data/sales.csv

# Report cadence: EITHER a named interval (daily | weekly | monthly) OR a
# cron expression — exactly one, never both.
report_schedule:
  interval: weekly
  # cron: "0 6 * * 1"

# Per-metric fractional change thresholds; 0.15 == ±15%. Metrics without an
# entry here fall back to the 0.15 default. Values must be > 0.
metric_thresholds:
  revenue: 0.15
  units_sold: 0.20

# Where drift/monitoring alerts are delivered (Story 2.4).
alert_recipients:
  - ops@example.com

# Report rendering target.
output:
  format: docx        # docx | pdf
  output_dir: output/
