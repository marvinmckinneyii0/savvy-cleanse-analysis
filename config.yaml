# SavvyCortex pipeline configuration (Phase 2). Secrets live in .env, NOT here.
# Loaded by backend.models.pipeline_config.PipelineConfig.load() — stateless,
# so scheduled agents pick up edits to this file on their next run.

# File path(s) or directory(ies) the agents pull data from.
data_sources:
  - data/sales.csv

# When scheduled agents run: exactly one of `interval` or `cron`.
report_schedule:
  interval: weekly            # one of: daily | weekly | monthly
  # cron: "0 6 * * 1"         # OR a cron expression (mutually exclusive with interval)

# Per-metric fractional change thresholds; 0.15 == ±15%. Metrics without an
# entry fall back to the default of 0.15.
metric_thresholds:
  revenue: 0.15
  units_sold: 0.20

# Who receives drift/monitoring alerts (Story 2.4). SMTP credentials come
# from environment variables (SMTP_*), never from this file.
alert_recipients:
  - ops@example.com

# Report rendering settings.
output:
  format: docx                # docx | pdf
  output_dir: output/
